<body>
    <h1> Panel de Administración - Glosario</h1>
    <form id="formulario-glosario">
        <div class="campo">
            <label for="concepto">Concepto: </label>
            <input type="text" id="concepto" placeholder="Escribe el concepto ..." required>
        </div> <br>
        <div class="campo">
            <label for="definicion">Definición: </label>
            <textarea id="definicion" placeholder="Escribe la defición aqui ..."></textarea>
        </div> <br>
        <button type="submit" id="btn-guardar"> Guardar Término</button>
        <button type="button" id="btn-cancelar" onclick="cancelarEdicion()">Cancelar Edicion</button>
    </form>

    <hr>
    <div id="contenedor-terminos">

    </div>
